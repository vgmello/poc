services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: outbox_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${PG_PASSWORD}"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d outbox_test"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 20
    networks:
      - outbox-net

  postgres-init:
    build:
      context: .
      dockerfile: DbInit/Dockerfile
    environment:
      ConnectionStrings__OutboxDb: "Host=postgres;Port=5432;Database=outbox_test;Username=postgres;Password=${PG_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./init-db/init.sql:/init.sql:ro
    networks:
      - outbox-net

  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: curl -f http://localhost:9644/v1/status/ready
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - outbox-net

  event-producer:
    build:
      context: .
      dockerfile: EventProducer/Dockerfile
    environment:
      ConnectionStrings__OutboxDb: "Host=postgres;Port=5432;Database=outbox_test;Username=postgres;Password=${PG_PASSWORD}"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    restart: on-failure
    networks:
      - outbox-net

  outbox-publisher:
    build:
      context: .
      dockerfile: OutboxPublisher/Dockerfile
    environment:
      ConnectionStrings__OutboxDb: "Host=postgres;Port=5432;Database=outbox_test;Username=postgres;Password=${PG_PASSWORD}"
      Kafka__BootstrapServers: "redpanda:9092"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
    restart: on-failure
    networks:
      - outbox-net

networks:
  outbox-net:
    driver: bridge
