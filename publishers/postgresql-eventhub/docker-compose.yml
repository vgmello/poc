name: outbox-publisher-postgresql-eventhub

networks:
  outbox-net:
    driver: bridge

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-outbox}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [outbox-net]

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    networks: [outbox-net]

  eventhub-emulator:
    image: mcr.microsoft.com/azure-messaging/eventhubs-emulator:latest
    ports:
      - "5672:5672"
    volumes:
      - ./eventhub-config/Config.json:/Eventhubs_Emulator/ConfigFiles/Config.json
    environment:
      BLOB_SERVER: azurite
      METADATA_SERVER: azurite
      ACCEPT_EULA: ${ACCEPT_EULA}
    depends_on:
      - azurite
    networks:
      outbox-net:
        aliases:
          - eventhubs-emulator

  dbinit:
    build:
      context: ../..
      dockerfile: tools/dbinit/Dockerfile
    environment:
      POSTGRES_CONN: "Host=postgres;Username=postgres;Password=${POSTGRES_PASSWORD};Database=${POSTGRES_DB:-outbox}"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [outbox-net]

  publisher:
    build:
      context: ../..
      dockerfile: publishers/postgresql-eventhub/Dockerfile
    environment:
      ConnectionStrings__OutboxDb: "Host=postgres;Username=postgres;Password=${POSTGRES_PASSWORD};Database=${POSTGRES_DB:-outbox}"
      Outbox__EventHub__ConnectionString: "Endpoint=sb://eventhubs-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
    restart: unless-stopped
    depends_on:
      dbinit:
        condition: service_completed_successfully
      eventhub-emulator:
        condition: service_started
    networks: [outbox-net]
